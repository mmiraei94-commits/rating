<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rating</title>
  </head>
  <body class="h-screen bg-black flex justify-center items-center">
    <div
      class="w-99.25 h-117.5 bg-container-bg rounded-[30px] px-7.5 pt-7.5 pb-15 flex flex-col justify-between" id="questionPage"
    >
      <div>
        <img
          src="public/icon-star.svg"
          alt=""
          class="bg-dark-blue p-3.75 rounded-full"
        />
      </div>
      <div>
        <h1 class="text-[27px] font[400] text-white">How did we do?</h1>
      </div>
      <div>
        <p class="text-light-grey">
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>
      </div>
      <div class="flex justify-between">
        <div
          class="bg-dark-blue size-12.5 flex justify-center items-center rounded-full text-light-grey default-selected cursor-pointer rating"
          id="rate1"
        >
          1
        </div>
        <div
          class="bg-dark-blue size-[50px] flex justify-center items-center rounded-full text-light-grey hover:bg-orange hover:text-white cursor-pointer rating"
          id="rate2"
        >
          2
        </div>
        <div
          class="bg-dark-blue size-12.5 flex justify-center items-center rounded-full text-light-grey hover:bg-orange hover:text-white cursor-pointer rating"
          id="rate3"
        >
          3
        </div>
        <div
          class="bg-dark-blue size-[50px] flex justify-center items-center rounded-full text-light-grey hover:bg-orange hover:text-white cursor-pointer rating"
          id="rate4"
        >
          4
        </div>
        <div
          class="bg-dark-blue size-12.5 flex justify-center items-center rounded-full text-light-grey hover:bg-orange hover:text-white cursor-pointer rate-number rating"
          id="rate5"
        >
          5
        </div>
      </div>
      <div>
        <button
          id="btnSubmit"
          class="h-[46.5px] w-full bg-orange rounded-full text-white font-[400] hover:bg-white hover:text-orange cursor-pointer"
        >
          SUBMIT
        </button>
      </div>
    </div>
    <div
      class="w-99.25 h-117.5 bg-container-bg rounded-[30px] px-7.5 pt-7.5 pb-15 flex flex-col justify-between text-center items-center hide"
      id="resultPage"
    >
      <div><img src="public/illustration-thank-you.svg" alt="" /></div>
      <div class="text-orange px-[15px] py-[6px] bg-dark-blue rounded-full">
        <p>You selected <span id="resultRate"></span> out of 5</p>
      </div>
      <div><h2 class="text-white text-[27px] font-[400]">Thank you!</h2></div>
      <div>
        <p class="text-light-grey">
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
